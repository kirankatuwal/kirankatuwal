<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Tracker | Kiran Singh Katuwal</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h1 class="title">Job Tracker</h1>
        <div class="form-container">
            <input type="text" name="compnay" id="company" placeholder="Company Name">
            <input type="text" name="role" id="role" placeholder="Job Role">
            <select name="status" id="status">
                <option value="Applied">Applied</option>
                <option value="Interview">Interview</option>
                <option value="Rejected">Rejected</option>
            </select>
            <button id="addBtn">Add Job</button>
        </div>

        <div class="goback">
            <h3><a href="/index.html">Go back to Profile</a></h3>
        </div>
        <div id="jobList"></div>


    </div>


    <script src="script.js"></script>

</body>


</html>
